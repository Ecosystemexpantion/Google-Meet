<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EEM26 Host Login</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%236B46C1'/><text y='68' x='50' text-anchor='middle' font-size='36' font-family='sans-serif' font-weight='900' fill='white'>E</text></svg>" />
</head>
<body class="page-auth">
  <div class="auth-card">
    <div class="auth-logo"><span class="brand-chip" style="font-size:18px;padding:8px 14px;">EEM26</span></div>
    <h1 class="auth-title">Host Access</h1>
    <p class="auth-subtitle">Enter your host password to access the control panel</p>
    <div id="auth-error" class="auth-error hidden" role="alert"></div>
    <form id="auth-form" novalidate>
      <label class="auth-label" for="password-input">Host Password</label>
      <input type="password" id="password-input" class="input-field input-dark" placeholder="Enter password" autocomplete="current-password" required />
      <button type="submit" id="auth-submit" class="btn btn-primary">Enter Host Room</button>
    </form>
    <p style="margin-top:20px;font-size:12px;color:var(--gray-500);text-align:center;">
      Students: <a href="index.html" style="color:var(--brand-light);text-decoration:none;">go to the training page →</a>
    </p>
  </div>
  <script src="config.js"></script>
  <script src="js/host-auth.js"></script>
</body>
</html>
